# Chạy thủ công: ghép sách → PDF/EPUB/DOCX → tạo GitHub Release và đính kèm file.
# Actions → "Release sách (PDF / EPUB / DOCX)" → Run workflow.

name: Release sách (PDF / EPUB / DOCX)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag cho release (vd: v1.0.0 hoặc book-2026-03-22)"
        required: true
        type: string
      title:
        description: "Tiêu đề hiển thị trên GitHub Release (để trống = dùng tag)"
        required: false
        type: string
        default: ""
      draft:
        description: "Tạo bản nháp (chưa hiện trên trang Releases công khai)"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Đánh dấu prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-book-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài pandoc, XeLaTeX và font Noto Sans
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            fonts-noto-core

      - name: Build & export
        run: |
          bash scripts/build-book.sh
          bash scripts/export.sh
          ls -la Cuoi-Vo-Bung.pdf Cuoi-Vo-Bung.epub Cuoi-Vo-Bung.docx

      # Tên file đính kèm = Cuoi-Vo-Bung-<tag>.{pdf,epub,docx} (tag được chuẩn hóa cho tên file)
      - name: Đổi tên artifact theo tag
        id: asset
        env:
          TAG: ${{ inputs.tag }}
        run: |
          SAFE="${TAG//\//-}"
          SAFE="${SAFE//:/-}"
          for ext in pdf epub docx; do
            mv "Cuoi-Vo-Bung.${ext}" "Cuoi-Vo-Bung-${SAFE}.${ext}"
          done
          ls -la "Cuoi-Vo-Bung-${SAFE}".*
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Tạo GitHub Release và đính kèm PDF, EPUB, DOCX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.title != '' && inputs.title || inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            Cuoi-Vo-Bung-${{ steps.asset.outputs.safe }}.pdf
            Cuoi-Vo-Bung-${{ steps.asset.outputs.safe }}.epub
            Cuoi-Vo-Bung-${{ steps.asset.outputs.safe }}.docx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
